<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">

<header th:fragment="header" class="header" id="header">
    <div class="header__scroll">
        <div class="container">
            <div class="header__inner">
                <div class="header__mobile"><a class="logo header__logo mobile" href="/" th:text="${tournamentName}"></a>
                    <button class="burger-button js_burger-btn" aria-label="открыть меню"><span></span>
                    </button>
                </div>
                <div class="header__left"><a class="logo header__logo" href="/" th:text="${tournamentName}"></a>
                    <nav class="header__nav">
                        <ul class="list-reset header__nav-list">
                            <li class="header__nav-item"><a class="header__nav-link" href="/fixtures">Матчи и результаты</a>
                            </li>
                            <li class="header__nav-item"><a class="header__nav-link" href="/tables">Таблицы и статистика</a>
                            </li>
                            <li class="header__nav-item"><a class="header__nav-link" href="/winning-team">Команда-победитель</a>
                            </li>
                            <li class="header__nav-item"><a class="header__nav-link" href="/archive">Архив турниров</a>
                            </li>
                        </ul>
                    </nav>
                </div>
                <div class="header__right">

                    <a class="header__link"
                       sec:authorize="isAuthenticated()"
                       th:href="@{/profile}"
                       th:text="${#authentication.principal.displayName}">
                    </a>

                    <a class="header__link"
                       href="/admin/matches"
                       sec:authorize="hasRole('ADMIN')">
                        Админка
                    </a>

                    <form th:action="@{/logout}" method="POST">
                        <button class="button" type="submit">Выйти</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</header>
