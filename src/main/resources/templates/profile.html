<body>
<div class="page">
    <header sec:authorize="!isAuthenticated()" th:insert="fragments/header-anonimus :: header"></header>
    <header sec:authorize="hasRole('USER')" th:insert="fragments/header-user :: header"></header>
    <header sec:authorize="hasRole('ADMIN')" th:insert="fragments/header-admin :: header"></header>

    <main>
        <div class="admin">
            <div class="container container--md"><strong class="title title--md section-title">Настройки
                пользователя</strong>
                <form class="form admin__form"
                      th:method="POST"
                      th:action="@{/profile}"
                      th:object="${user}">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <!-- Email (readonly display) -->
                    <div class="form__control">
                        <div class="form__label">Email</div>
                        <div class="form-control-plaintext">
                            <span th:text="${email}"></span>
                        </div>
                    </div>

                    <!-- Username -->
                    <label class="form__control mt-3">
                        <div class="form__label">Никнейм</div>
                        <input th:field="*{username}"
                               class="form-control"
                               type="text"
                               placeholder="Введите никнейм"
                               required>

                        <div class="invalid-feedback d-block"
                             th:if="${#fields.hasErrors('username')}"
                             th:errors="*{username}">
                        </div>
                    </label>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary mt-3">
                        Сохранить
                    </button>

                    <!-- Success message -->
                    <div class="alert alert-success mt-3"
                         th:if="${message}"
                         th:text="${message}">
                    </div>

                </form>
                </label>
                </form>
            </div>
        </div>
    </main>

    <footer th:insert="fragments/footer :: footer"></footer>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"

<script src="/js/main.js"></script>
</body>
