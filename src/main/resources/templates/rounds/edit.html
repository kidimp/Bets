    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/img/ico/favicon.ico" type="image/vnd.microsoft.icon">
    <title>Админка. Редактировать раунд</title>

        (function(m,e,t,r,i,k,a){

<body>
<div class="page">
    <header th:insert="fragments/header-admin :: header"></header>
    <main>
        <div class="admin">
            <div class="container container--md"><strong class="title title--md section-title">Редактирование раунда</strong>
                <form class="form admin__form" th:method="POST" th:action="@{/admin/rounds/{id}/edit(id=${round.getId()})}" th:object="${round}">
                    <div class="form__inputs">
                        <label class="form__control">
                            <div class="form__label">Название</div>
                            <input class="form-control form__control" type="text" th:field="*{name}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">ERROR</div>
                        </label>
                        <label class="form__control">
                            <div class="form__label">Раунд</div>
                            <input class="form-control form__control" type="number" th:field="*{round}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('round')}" th:errors="*{round}">ERROR</div>
                        </label>
                    </div>
                    <button class="button button--primary form__submit" type="submit">Сохранить</button>
                </form>
            </div>
        </div>
    </main>
    <footer th:insert="fragments/footer :: footer"></footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script src="/js/main.js"></script>
</body>
</html>
